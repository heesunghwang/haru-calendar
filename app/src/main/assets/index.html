  <style>
    :root{--p:#6c5ce7;--ink:#172022;--muted:#8b9293;--bg:#f3f1ec}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:Arial,sans-serif;-webkit-tap-highlight-color:transparent}.top{height:68px;padding:12px 18px;display:flex;align-items:center;justify-content:space-between}.brand{display:flex;align-items:center;gap:10px;font-weight:800}.logo{display:grid;place-items:center;width:36px;height:36px;border-radius:12px;background:var(--p);color:white}.sync-tools{display:flex;align-items:center;gap:3px}.local{border:0;background:transparent;font-size:11px;color:#697071}.local:before{content:'';display:inline-block;width:7px;height:7px;background:#00a896;border-radius:50%;margin-right:6px}.refresh{display:grid;place-items:center;width:31px;height:31px;border:1px solid #ddd9d1;border-radius:10px;background:#fff;color:var(--p);font-size:18px}.refresh.spin{animation:spin .7s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.wrap{padding:0 12px 90px}.card{background:#fff;border:1px solid #e3e0d9;border-radius:20px;box-shadow:0 10px 30px #423d3010}.calendar{padding:20px 12px 14px}.head{display:flex;justify-content:space-between;align-items:center;padding:0 5px}.eyebrow{color:var(--p);font-size:9px;font-weight:900;letter-spacing:1.5px;margin:0 0 5px}.head h1{font-size:23px;margin:0}.controls{display:flex;gap:5px}.controls button{height:34px;min-width:34px;border:1px solid #e1ded8;background:#fff;border-radius:10px;font-size:18px}.controls .today-btn{font-size:11px;font-weight:700;padding:0 9px}.week,.grid{display:grid;grid-template-columns:repeat(7,1fr)}.week{margin-top:18px;border:1px solid #e6e2db;border-radius:10px 10px 0 0;background:#f8f7f4;overflow:hidden}.week span{text-align:center;padding:10px 0;color:#969b9c;font-size:10px;font-weight:700;border-right:1px solid #e6e2db}.week span:last-child{border-right:0}.week span:first-child{color:#dc6c69}.grid{margin-top:1px;gap:1px;padding:1px;background:#e6e2db;border:1px solid #e6e2db;border-radius:0 0 11px 11px;overflow:hidden}.grid>div{background:#faf9f7}.day{position:relative;height:63px;border:0;border-radius:0;background:#fff;text-align:left;padding:0}.day.sel{background:#f0edff;box-shadow:inset 0 0 0 2px #cfc7ff}.day span{position:absolute;left:6px;top:5px;display:grid;place-items:center;width:24px;height:24px;font-size:11px;font-weight:700}.day:nth-child(7n+1) span{color:#dc514d}.day span.now{background:var(--p);color:#fff;border-radius:50%}.day-note{display:block;max-width:calc(100% - 8px);margin:31px 4px 0;color:#c24e4a;font-size:8px;font-style:normal;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.dots{position:absolute;left:6px;bottom:3px;display:flex;gap:4px}.dots i{width:8px;height:8px;border-radius:50%;box-shadow:0 1px 2px #0002}.agenda{margin-top:12px;min-height:260px;overflow:hidden}.agenda-head{position:relative;padding:19px 20px;border-bottom:1px solid #eeeae4}.agenda-head h2{margin:0;font-size:18px}.note-btn{position:absolute;right:17px;top:21px;border:1px solid #d9d3fb;border-radius:9px;padding:8px 10px;background:#f3f0ff;color:var(--p);font-size:10px;font-weight:800}.list{padding:10px}.empty{text-align:center;padding:45px 10px}.empty .check{display:grid;place-items:center;width:46px;height:46px;margin:0 auto 14px;border-radius:15px;background:#ece9ff;color:var(--p);font-weight:900}.empty h3{font-size:14px;margin:0 0 7px}.empty p{font-size:11px;color:#929899;margin:0}.event{width:100%;display:grid;grid-template-columns:4px 58px 1fr 12px;gap:9px;align-items:center;border:0;border-bottom:1px solid #efede8;background:#fff;text-align:left;padding:14px 7px}.bar{height:36px;border-radius:4px}.time{font-size:10px;color:#777f80}.copy{display:grid;gap:3px}.copy b{font-size:12px}.copy small{color:#909697;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.fab{position:fixed;right:21px;bottom:22px;width:57px;height:57px;border:0;border-radius:18px;background:var(--p);color:#fff;font-size:31px;box-shadow:0 12px 25px #6c5ce75e}.shade{display:none;position:fixed;inset:0;z-index:5;background:#17152380;padding:18px;align-items:center;justify-content:center}.shade.show{display:flex}.modal{width:100%;max-width:430px;background:#fff;border-radius:23px;padding:23px}.modal-top{display:flex;justify-content:space-between;margin-bottom:18px}.modal h2{font-size:20px;margin:0}.close{width:34px;height:34px;border:0;border-radius:50%;font-size:20px}.modal label{display:grid;gap:6px;margin-bottom:13px;font-size:11px;font-weight:800;color:#596062}.modal input,.modal textarea{width:100%;border:1px solid #ddd9d1;border-radius:11px;padding:12px;background:#fcfbf9;font:inherit}.colors{display:flex;gap:12px;margin:5px 0 20px}.color{width:27px;height:27px;border:3px solid white;border-radius:50%;box-shadow:0 0 0 1px #ddd}.color.active{box-shadow:0 0 0 2px #777}.actions{display:flex;gap:8px;justify-content:flex-end}.actions button{border:1px solid #ddd9d1;border-radius:10px;padding:11px 17px;background:white;font-weight:800}.actions .save{border:0;background:var(--p);color:white}.actions .del{margin-right:auto;color:#d55252}.sync-help{font-size:11px;line-height:1.6;color:#858c8d;margin:-3px 0 18px}.code-row{display:flex;gap:7px}.code-row input{font-size:22px;font-weight:900;letter-spacing:7px;text-align:center}.code-row button{border:1px solid #d9d3fb;border-radius:11px;background:#f3f0ff;color:var(--p);font-weight:800;white-space:nowrap}.confirm-shade{z-index:20}.confirm-modal{max-width:360px;padding:25px}.confirm-modal h2{margin:0 0 9px;font-size:20px}.confirm-modal p{margin:0 0 25px;color:#72797a;font-size:13px;line-height:1.55}.confirm-actions{display:flex;justify-content:flex-end;gap:9px}.confirm-actions button{min-width:76px;border:1px solid #ddd9d1;border-radius:11px;padding:12px 16px;background:#fff;font-weight:800}.confirm-actions .confirm-delete{border:0;background:#d95c58;color:#fff}
    .code-row input{font-size:16px;letter-spacing:2px}
    .auth-tabs{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:18px;padding:4px;border-radius:12px;background:#f3f1ec}.auth-tabs button{border:0;border-radius:9px;padding:10px;background:transparent;font-weight:800;color:#7b8283}.auth-tabs button.active{background:#fff;color:var(--p);box-shadow:0 2px 8px #00000010}.auth-message{min-height:18px;margin:0 0 12px;color:#d55252;font-size:11px;line-height:1.5}.auth-message.ok{color:#008c78}.account-box{display:none;padding:14px;margin-bottom:16px;border-radius:12px;background:#f7f5ff}.account-box b{display:block;margin-bottom:4px}.account-box small{color:#7d8485}.link-btn{border:0!important;padding:8px 3px!important;background:transparent!important;color:var(--p);font-size:11px}.danger-link{color:#d55252!important}
  </style>

<body>
  <header class="top"><div class="brand"><span class="logo">H</span>HARU</div><div class="sync-tools"><button class="local" id="syncStatus" onclick="openAuth()">로그인</button><button class="refresh" id="refreshBtn" onclick="manualRefresh()" title="동기화 새로고침">↻</button></div></header>
  <main class="wrap"><section class="card calendar" id="calendar"><div class="head"><div><p class="eyebrow">MY CALENDAR</p><h1 id="monthTitle"></h1></div><div class="controls"><button onclick="move(-1)">‹</button><button class="today-btn" onclick="goToday()">오늘</button><button onclick="move(1)">›</button></div></div><div class="week"><span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span></div><div id="grid" class="grid"></div></section><section class="card agenda"><div class="agenda-head"><p class="eyebrow">SELECTED DAY</p><h2 id="dayTitle"></h2><button class="note-btn" onclick="openDayNote()">날짜 메모</button></div><div class="list" id="list"></div></section></main>
  <button class="fab" onclick="openModal()">+</button>
  <div class="shade" id="shade"><form class="modal" onsubmit="save(event)"><div class="modal-top"><div><p class="eyebrow">SCHEDULE</p><h2 id="modalTitle">새 일정</h2></div><button type="button" class="close" onclick="closeModal()">×</button></div><label>날짜<input id="date" type="date" required></label><label>일정 이름<input id="title" placeholder="예: 치과 예약" required></label><label>시간<input id="time" type="time" value="09:00"></label><label>메모<textarea id="note" rows="3" placeholder="필요한 내용을 적어두세요"></textarea></label><div class="colors" id="colors"></div><div class="actions"><button type="button" class="del" id="del" onclick="removeEvent()">삭제</button><button type="button" onclick="closeModal()">취소</button><button class="save">저장</button></div></form></div>
  <div class="shade" id="dayNoteShade"><form class="modal" onsubmit="saveDayNote(event)"><div class="modal-top"><div><p class="eyebrow">SPECIAL DAY</p><h2>날짜 메모</h2></div><button type="button" class="close" onclick="closeDayNote()">×</button></div><label>달력에 표시할 문구<input id="dayNoteInput" maxlength="12" placeholder="예: 광복절, 엄마 생일, 휴가"></label><p style="font-size:11px;color:#8b9293;margin:-3px 0 20px">일정과 별도로 날짜 칸에 표시됩니다.</p><div class="actions"><button type="button" class="del" onclick="deleteDayNote()">메모 삭제</button><button type="button" onclick="closeDayNote()">취소</button><button class="save">저장</button></div></form></div>
  <div class="shade" id="authShade"><form class="modal" id="authForm" onsubmit="submitAuth(event)"><div class="modal-top"><div><p class="eyebrow">HARU ACCOUNT</p><h2 id="authTitle">로그인</h2></div><button type="button" class="close" onclick="closeAuth()">×</button></div><div id="authGuest"><div class="auth-tabs"><button type="button" id="loginTab" class="active" onclick="setAuthMode('login')">로그인</button><button type="button" id="signupTab" onclick="setAuthMode('signup')">회원가입</button></div><p class="sync-help" id="authHelp">같은 계정으로 모바일과 컴퓨터 일정을 동기화합니다.</p><label>이메일<input id="authEmail" type="email" autocomplete="email" placeholder="name@example.com" required></label><label>비밀번호<input id="authPassword" type="password" autocomplete="current-password" minlength="8" placeholder="8자 이상" required></label><p class="auth-message" id="authMessage"></p><div class="actions"><button type="button" onclick="closeAuth()">취소</button><button class="save" id="authSubmit">로그인</button></div></div><div id="authAccount" class="account-box"><b id="accountEmail"></b><small>이 계정으로 일정이 안전하게 동기화됩니다.</small><p class="auth-message" id="accountMessage"></p><div class="actions" style="margin-top:16px"><button type="button" class="link-btn danger-link" onclick="openAccountDeleteConfirm()">회원 탈퇴</button><button type="button" onclick="logout()">로그아웃</button></div></div></form></div>
  <div class="shade confirm-shade" id="deleteConfirm"><div class="modal confirm-modal"><p class="eyebrow">DELETE SCHEDULE</p><h2>일정을 삭제할까요?</h2><p>삭제한 일정은 다시 복구할 수 없습니다.</p><div class="confirm-actions"><button type="button" onclick="closeDeleteConfirm()">취소</button><button type="button" class="confirm-delete" onclick="confirmRemoveEvent()">삭제</button></div></div></div>
  <div class="shade confirm-shade" id="accountDeleteConfirm"><div class="modal confirm-modal"><p class="eyebrow">DELETE ACCOUNT</p><h2>회원 탈퇴할까요?</h2><p>계정과 서버에 저장된 모든 일정이 삭제되며 복구할 수 없습니다.</p><div class="confirm-actions"><button type="button" onclick="closeAccountDeleteConfirm()">취소</button><button type="button" class="confirm-delete" onclick="deleteAccount()">탈퇴</button></div></div></div>
  <script>
    const palette=['#6c5ce7','#00a896','#ef8354','#e0568c'], SUPABASE='https://xiicyyvnrxhclfsdeube.supabase.co', API_KEY='sb_publishable_WB7yajBEjEYGTvEYYSNEvg_n5F4FNLK'; let now=new Date(), cursor=new Date(now.getFullYear(),now.getMonth(),1), selected=key(now), editing=null, color=palette[0], events=JSON.parse(localStorage.getItem('haru-events')||'[]'), dayNotes=JSON.parse(localStorage.getItem('haru-day-notes')||'{}'),session=JSON.parse(localStorage.getItem('haru-session')||'null'),authMode='login',remoteUpdatedAt=0,syncBusy=false;
    function key(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
    function render(){document.getElementById('monthTitle').textContent=`${cursor.getFullYear()}년 ${cursor.getMonth()+1}월`; document.getElementById('dayTitle').textContent=`${+selected.slice(5,7)}월 ${+selected.slice(8)}일 일정`; let first=new Date(cursor.getFullYear(),cursor.getMonth(),1), last=new Date(cursor.getFullYear(),cursor.getMonth()+1,0), html=''; for(let i=0;i<first.getDay();i++)html+='<div></div>'; for(let d=1;d<=last.getDate();d++){let dt=new Date(cursor.getFullYear(),cursor.getMonth(),d),k=key(dt), dots=events.filter(e=>e.date===k).slice(0,3).map(e=>`<i style="background:${e.color}"></i>`).join(''), label=dayNotes[k]?`<em class="day-note">${escapeHtml(dayNotes[k])}</em>`:''; html+=`<button class="day ${k===selected?'sel':''}" onclick="selectDay('${k}')"><span class="${k===key(now)?'now':''}">${d}</span>${label}<div class="dots">${dots}</div></button>`} document.getElementById('grid').innerHTML=html; renderList()}
    function renderList(){let es=events.filter(e=>e.date===selected).sort((a,b)=>a.time.localeCompare(b.time)), el=document.getElementById('list'); if(!es.length){el.innerHTML='<div class="empty"><div class="check">✓</div><h3>여유로운 하루예요</h3><p>새로운 일정을 추가해 보세요.</p></div>';return} el.innerHTML=es.map(e=>`<button class="event" onclick="edit('${e.id}')"><span class="bar" style="background:${e.color}"></span><span class="time">${e.time||'하루 종일'}</span><span class="copy"><b>${escapeHtml(e.title)}</b><small>${escapeHtml(e.note||'')}</small></span><span>›</span></button>`).join('')}
    function escapeHtml(s){let d=document.createElement('div');d.textContent=s;return d.innerHTML} function selectDay(k){selected=k;render()} function move(n){cursor=new Date(cursor.getFullYear(),cursor.getMonth()+n,1);render()} function goToday(){cursor=new Date(now.getFullYear(),now.getMonth(),1);selected=key(now);render()}
    function drawColors(){document.getElementById('colors').innerHTML=palette.map(c=>`<button type="button" class="color ${c===color?'active':''}" style="background:${c}" onclick="setColor('${c}')"></button>`).join('')} function setColor(c){color=c;drawColors()}
    function openModal(){editing=null;color=palette[0];document.getElementById('modalTitle').textContent='새 일정';document.getElementById('date').value=selected;document.getElementById('title').value='';document.getElementById('time').value='09:00';document.getElementById('note').value='';document.getElementById('del').style.display='none';drawColors();document.getElementById('shade').classList.add('show')}
    function edit(id){editing=events.find(e=>e.id===id);color=editing.color;document.getElementById('modalTitle').textContent='일정 수정';['date','title','time','note'].forEach(k=>document.getElementById(k).value=editing[k]||'');document.getElementById('del').style.display='block';drawColors();document.getElementById('shade').classList.add('show')}
    function closeModal(){document.getElementById('shade').classList.remove('show')} function persist(){localStorage.setItem('haru-events',JSON.stringify(events));render();pushSync()}
    function save(ev){ev.preventDefault();let item={id:editing?editing.id:String(Date.now()),date:document.getElementById('date').value,title:document.getElementById('title').value.trim(),time:document.getElementById('time').value,note:document.getElementById('note').value.trim(),color}; if(editing)events=events.map(e=>e.id===item.id?item:e);else events.push(item); selected=item.date;cursor=new Date(+item.date.slice(0,4),+item.date.slice(5,7)-1,1);persist();closeModal()}
    function authHeaders(){return {'Content-Type':'application/json','apikey':API_KEY,'Authorization':'Bearer '+session.access_token}} function saveSession(value){session=value;if(value)localStorage.setItem('haru-session',JSON.stringify(value));else localStorage.removeItem('haru-session');updateSyncStatus()} function updateSyncStatus(text){let email=session&&session.user&&session.user.email;document.getElementById('syncStatus').textContent=text||(email?email.split('@')[0]+' · 연결됨':'로그인')} function setAuthMessage(text,ok=false){let e=document.getElementById('authMessage');e.textContent=text;e.classList.toggle('ok',ok)} function setAuthMode(mode){authMode=mode;document.getElementById('loginTab').classList.toggle('active',mode==='login');document.getElementById('signupTab').classList.toggle('active',mode==='signup');document.getElementById('authTitle').textContent=mode==='login'?'로그인':'회원가입';document.getElementById('authSubmit').textContent=mode==='login'?'로그인':'인증 메일 보내기';document.getElementById('authPassword').autocomplete=mode==='login'?'current-password':'new-password';setAuthMessage('')} function openAuth(){let logged=!!(session&&session.user);document.getElementById('authGuest').style.display=logged?'none':'block';document.getElementById('authAccount').style.display=logged?'block':'none';if(logged)document.getElementById('accountEmail').textContent=session.user.email;else setAuthMode('login');document.getElementById('authShade').classList.add('show')} function closeAuth(){document.getElementById('authShade').classList.remove('show')}
    async function submitAuth(e){e.preventDefault();let email=document.getElementById('authEmail').value.trim(),password=document.getElementById('authPassword').value;if(password.length<8)return setAuthMessage('비밀번호는 8자 이상 입력해 주세요.');setAuthMessage('처리 중…',true);try{let redirect=encodeURIComponent('https://heesunghwang.github.io/haru-calendar/auth-confirmed.html'),url=authMode==='signup'?SUPABASE+'/auth/v1/signup?redirect_to='+redirect:SUPABASE+'/auth/v1/token?grant_type=password',r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json','apikey':API_KEY},body:JSON.stringify({email,password})}),j=await r.json();if(!r.ok)throw new Error(j.msg||j.message||j.error_description||'인증에 실패했습니다.');if(authMode==='signup'&&!j.access_token){setAuthMessage('인증 메일을 보냈습니다. 메일의 링크를 누른 뒤 로그인해 주세요.',true);return}saveSession(j);closeAuth();await pullSync(true)}catch(err){setAuthMessage(err.message==='Email not confirmed'?'이메일 인증을 먼저 완료해 주세요.':err.message)}}
    async function refreshSession(){if(!session||!session.refresh_token)return false;try{let r=await fetch(SUPABASE+'/auth/v1/token?grant_type=refresh_token',{method:'POST',headers:{'Content-Type':'application/json','apikey':API_KEY},body:JSON.stringify({refresh_token:session.refresh_token})}),j=await r.json();if(!r.ok)throw new Error();saveSession(j);return true}catch(e){saveSession(null);return false}} async function ensureSession(){if(!session)return false;if(!session.expires_at||session.expires_at*1000<Date.now()+60000)return refreshSession();return true} async function logout(){try{if(session)await fetch(SUPABASE+'/auth/v1/logout',{method:'POST',headers:authHeaders()})}catch(e){}saveSession(null);closeAuth()}
    function openAccountDeleteConfirm(){document.getElementById('accountDeleteConfirm').classList.add('show')} function closeAccountDeleteConfirm(){document.getElementById('accountDeleteConfirm').classList.remove('show')} async function deleteAccount(){if(!session)return;closeAccountDeleteConfirm();let message=document.getElementById('accountMessage');message.textContent='계정과 서버 일정을 삭제하는 중…';message.classList.add('ok');try{let r=await fetch(SUPABASE+'/rest/v1/rpc/delete_own_account',{method:'POST',headers:authHeaders(),body:'{}'});if(!r.ok)throw new Error('회원 탈퇴에 실패했습니다.');saveSession(null);localStorage.removeItem('haru-events');localStorage.removeItem('haru-day-notes');events=[];dayNotes={};render();closeAuth()}catch(e){message.textContent=e.message;message.classList.remove('ok')}}
    async function pushSync(){if(!session||syncBusy||!await ensureSession())return;syncBusy=true;updateSyncStatus('동기화 중…');try{let stamp=new Date().toISOString(),r=await fetch(SUPABASE+'/rest/v1/user_calendars?on_conflict=user_id',{method:'POST',headers:{...authHeaders(),'Prefer':'resolution=merge-duplicates,return=representation'},body:JSON.stringify([{user_id:session.user.id,data:{events,dayNotes},updated_at:stamp}])}),j=await r.json();if(!r.ok)throw new Error(j.message||'sync failed');remoteUpdatedAt=Date.parse(stamp);updateSyncStatus()}catch(e){updateSyncStatus('연결 확인 필요')}finally{syncBusy=false}} async function pullSync(first){if(!session||syncBusy||!await ensureSession())return;try{let r=await fetch(SUPABASE+'/rest/v1/user_calendars?select=data,updated_at&user_id=eq.'+encodeURIComponent(session.user.id),{headers:authHeaders()}),j=await r.json();if(!r.ok)throw new Error(j.message||'sync failed');let row=j[0];if(row&&row.data&&(Date.parse(row.updated_at)>remoteUpdatedAt||first==='force'||first===true)){events=row.data.events||[];dayNotes=row.data.dayNotes||{};remoteUpdatedAt=Date.parse(row.updated_at)||Date.now();localStorage.setItem('haru-events',JSON.stringify(events));localStorage.setItem('haru-day-notes',JSON.stringify(dayNotes));render()}else if(first===true&&!row)await pushSync();updateSyncStatus()}catch(e){updateSyncStatus('연결 확인 필요')}} async function manualRefresh(){if(!session)return openAuth();let b=document.getElementById('refreshBtn');b.classList.add('spin');updateSyncStatus('새로고침 중…');await pullSync('force');setTimeout(()=>b.classList.remove('spin'),300)}
    function removeEvent(){if(!editing)return;document.getElementById('deleteConfirm').classList.add('show')} function closeDeleteConfirm(){document.getElementById('deleteConfirm').classList.remove('show')} async function confirmRemoveEvent(){if(!editing){closeDeleteConfirm();return}let deletingId=editing.id;events=events.filter(e=>e.id!==deletingId);editing=null;localStorage.setItem('haru-events',JSON.stringify(events));closeDeleteConfirm();render();closeModal();await pushSync()} render();updateSyncStatus();if(session){pullSync(true);setInterval(()=>pullSync(false),10000)}
    function openDayNote(){document.getElementById('dayNoteInput').value=dayNotes[selected]||'';document.getElementById('dayNoteShade').classList.add('show');setTimeout(()=>document.getElementById('dayNoteInput').focus(),100)} function closeDayNote(){document.getElementById('dayNoteShade').classList.remove('show')} async function saveDayNote(e){e.preventDefault();let value=document.getElementById('dayNoteInput').value.trim(),next={...dayNotes};if(value)next[selected]=value;else delete next[selected];dayNotes=next;localStorage.setItem('haru-day-notes',JSON.stringify(dayNotes));render();closeDayNote();await pushSync()} async function deleteDayNote(){let next={...dayNotes};delete next[selected];dayNotes=next;document.getElementById('dayNoteInput').value='';localStorage.setItem('haru-day-notes',JSON.stringify(dayNotes));render();closeDayNote();await pushSync()}
  </script>
