<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>하루 캘린더</title>
  <style>
    :root{--p:#6c5ce7;--ink:#172022;--muted:#8b9293;--bg:#f3f1ec}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:Arial,sans-serif;-webkit-tap-highlight-color:transparent}.top{height:68px;padding:12px 18px;display:flex;align-items:center;justify-content:space-between}.brand{display:flex;align-items:center;gap:10px;font-weight:800}.logo{display:grid;place-items:center;width:36px;height:36px;border-radius:12px;background:var(--p);color:white}.sync-tools{display:flex;align-items:center;gap:3px}.local{border:0;background:transparent;font-size:11px;color:#697071}.local:before{content:'';display:inline-block;width:7px;height:7px;background:#00a896;border-radius:50%;margin-right:6px}.refresh{display:grid;place-items:center;width:31px;height:31px;border:1px solid #ddd9d1;border-radius:10px;background:#fff;color:var(--p);font-size:18px}.refresh.spin{animation:spin .7s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.wrap{padding:0 12px 90px}.card{background:#fff;border:1px solid #e3e0d9;border-radius:20px;box-shadow:0 10px 30px #423d3010}.calendar{padding:20px 12px 14px}.head{display:flex;justify-content:space-between;align-items:center;padding:0 5px}.eyebrow{color:var(--p);font-size:9px;font-weight:900;letter-spacing:1.5px;margin:0 0 5px}.head h1{font-size:23px;margin:0}.controls{display:flex;gap:5px}.controls button{height:34px;min-width:34px;border:1px solid #e1ded8;background:#fff;border-radius:10px;font-size:18px}.controls .today-btn{font-size:11px;font-weight:700;padding:0 9px}.week,.grid{display:grid;grid-template-columns:repeat(7,1fr)}.week{margin-top:18px;border:1px solid #e6e2db;border-radius:10px 10px 0 0;background:#f8f7f4;overflow:hidden}.week span{text-align:center;padding:10px 0;color:#969b9c;font-size:10px;font-weight:700;border-right:1px solid #e6e2db}.week span:last-child{border-right:0}.week span:first-child{color:#dc6c69}.grid{margin-top:1px;gap:1px;padding:1px;background:#e6e2db;border:1px solid #e6e2db;border-radius:0 0 11px 11px;overflow:hidden}.grid>div{background:#faf9f7}.day{position:relative;height:63px;border:0;border-radius:0;background:#fff;text-align:left;padding:0}.day.sel{background:#f0edff;box-shadow:inset 0 0 0 2px #cfc7ff}.day span{position:absolute;left:6px;top:5px;display:grid;place-items:center;width:24px;height:24px;font-size:11px;font-weight:700}.day:nth-child(7n+1) span{color:#dc514d}.day span.now{background:var(--p);color:#fff;border-radius:50%}.day-note{display:block;max-width:calc(100% - 8px);margin:31px 4px 0;color:#c24e4a;font-size:8px;font-style:normal;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.dots{position:absolute;left:6px;bottom:3px;display:flex;gap:4px}.dots i{width:8px;height:8px;border-radius:50%;box-shadow:0 1px 2px #0002}.agenda{margin-top:12px;min-height:260px;overflow:hidden}.agenda-head{position:relative;padding:19px 20px;border-bottom:1px solid #eeeae4}.agenda-head h2{margin:0;font-size:18px}.note-btn{position:absolute;right:17px;top:21px;border:1px solid #d9d3fb;border-radius:9px;padding:8px 10px;background:#f3f0ff;color:var(--p);font-size:10px;font-weight:800}.list{padding:10px}.empty{text-align:center;padding:45px 10px}.empty .check{display:grid;place-items:center;width:46px;height:46px;margin:0 auto 14px;border-radius:15px;background:#ece9ff;color:var(--p);font-weight:900}.empty h3{font-size:14px;margin:0 0 7px}.empty p{font-size:11px;color:#929899;margin:0}.event{width:100%;display:grid;grid-template-columns:4px 58px 1fr 12px;gap:9px;align-items:center;border:0;border-bottom:1px solid #efede8;background:#fff;text-align:left;padding:14px 7px}.bar{height:36px;border-radius:4px}.time{font-size:10px;color:#777f80}.copy{display:grid;gap:3px}.copy b{font-size:12px}.copy small{color:#909697;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.fab{position:fixed;right:21px;bottom:22px;width:57px;height:57px;border:0;border-radius:18px;background:var(--p);color:#fff;font-size:31px;box-shadow:0 12px 25px #6c5ce75e}.shade{display:none;position:fixed;inset:0;z-index:5;background:#17152380;padding:18px;align-items:center;justify-content:center}.shade.show{display:flex}.modal{width:100%;max-width:430px;background:#fff;border-radius:23px;padding:23px}.modal-top{display:flex;justify-content:space-between;margin-bottom:18px}.modal h2{font-size:20px;margin:0}.close{width:34px;height:34px;border:0;border-radius:50%;font-size:20px}.modal label{display:grid;gap:6px;margin-bottom:13px;font-size:11px;font-weight:800;color:#596062}.modal input,.modal textarea{width:100%;border:1px solid #ddd9d1;border-radius:11px;padding:12px;background:#fcfbf9;font:inherit}.colors{display:flex;gap:12px;margin:5px 0 20px}.color{width:27px;height:27px;border:3px solid white;border-radius:50%;box-shadow:0 0 0 1px #ddd}.color.active{box-shadow:0 0 0 2px #777}.actions{display:flex;gap:8px;justify-content:flex-end}.actions button{border:1px solid #ddd9d1;border-radius:10px;padding:11px 17px;background:white;font-weight:800}.actions .save{border:0;background:var(--p);color:white}.actions .del{margin-right:auto;color:#d55252}.sync-help{font-size:11px;line-height:1.6;color:#858c8d;margin:-3px 0 18px}.code-row{display:flex;gap:7px}.code-row input{font-size:22px;font-weight:900;letter-spacing:7px;text-align:center}.code-row button{border:1px solid #d9d3fb;border-radius:11px;background:#f3f0ff;color:var(--p);font-weight:800;white-space:nowrap}
  </style>
</head>
<body>
  <header class="top"><div class="brand"><span class="logo">하</span>하루 캘린더</div><div class="sync-tools"><button class="local" id="syncStatus" onclick="openSync()">동기화 설정</button><button class="refresh" id="refreshBtn" onclick="manualRefresh()" title="동기화 새로고침">↻</button></div></header>
  <main class="wrap"><section class="card calendar" id="calendar"><div class="head"><div><p class="eyebrow">MY CALENDAR</p><h1 id="monthTitle"></h1></div><div class="controls"><button onclick="move(-1)">‹</button><button class="today-btn" onclick="goToday()">오늘</button><button onclick="move(1)">›</button></div></div><div class="week"><span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span></div><div id="grid" class="grid"></div></section><section class="card agenda"><div class="agenda-head"><p class="eyebrow">SELECTED DAY</p><h2 id="dayTitle"></h2><button class="note-btn" onclick="openDayNote()">날짜 메모</button></div><div class="list" id="list"></div></section></main>
  <button class="fab" onclick="openModal()">+</button>
  <div class="shade" id="shade"><form class="modal" onsubmit="save(event)"><div class="modal-top"><div><p class="eyebrow">SCHEDULE</p><h2 id="modalTitle">새 일정</h2></div><button type="button" class="close" onclick="closeModal()">×</button></div><label>날짜<input id="date" type="date" required></label><label>일정 이름<input id="title" placeholder="예: 치과 예약" required></label><label>시간<input id="time" type="time" value="09:00"></label><label>메모<textarea id="note" rows="3" placeholder="필요한 내용을 적어두세요"></textarea></label><div class="colors" id="colors"></div><div class="actions"><button type="button" class="del" id="del" onclick="removeEvent()">삭제</button><button type="button" onclick="closeModal()">취소</button><button class="save">저장</button></div></form></div>
  <div class="shade" id="dayNoteShade"><form class="modal" onsubmit="saveDayNote(event)"><div class="modal-top"><div><p class="eyebrow">SPECIAL DAY</p><h2>날짜 메모</h2></div><button type="button" class="close" onclick="closeDayNote()">×</button></div><label>달력에 표시할 문구<input id="dayNoteInput" maxlength="12" placeholder="예: 광복절, 엄마 생일, 휴가"></label><p style="font-size:11px;color:#8b9293;margin:-3px 0 20px">일정과 별도로 날짜 칸에 표시됩니다.</p><div class="actions"><button type="button" class="del" onclick="deleteDayNote()">메모 삭제</button><button type="button" onclick="closeDayNote()">취소</button><button class="save">저장</button></div></form></div>
  <div class="shade" id="syncShade"><form class="modal" onsubmit="saveSync(event)"><div class="modal-top"><div><p class="eyebrow">DEVICE SYNC</p><h2>컴퓨터와 동기화</h2></div><button type="button" class="close" onclick="closeSync()">×</button></div><p class="sync-help">컴퓨터 웹 캘린더와 같은 6자리 코드를 입력하세요. 새로 만들기를 누르면 새로운 코드가 생성됩니다.</p><label>동기화 코드<div class="code-row"><input id="syncInput" inputmode="numeric" maxlength="6" placeholder="000000"><button type="button" onclick="generateSyncCode()">새로 만들기</button></div></label><div class="actions"><button type="button" class="del" onclick="disconnectSync()">연결 해제</button><button type="button" onclick="closeSync()">취소</button><button class="save">연결</button></div></form></div>
  <script>
    const palette=['#6c5ce7','#00a896','#ef8354','#e0568c'], SUPABASE='https://xiicyyvnrxhclfsdeube.supabase.co', API_KEY='sb_publishable_WB7yajBEjEYGTvEYYSNEvg_n5F4FNLK'; let now=new Date(), cursor=new Date(now.getFullYear(),now.getMonth(),1), selected=key(now), editing=null, color=palette[0], events=JSON.parse(localStorage.getItem('haru-events')||'[]'), dayNotes=JSON.parse(localStorage.getItem('haru-day-notes')||'{}'),syncCode=localStorage.getItem('haru-sync-code')||'',remoteUpdatedAt=0;
    function key(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
    function render(){document.getElementById('monthTitle').textContent=`${cursor.getFullYear()}년 ${cursor.getMonth()+1}월`; document.getElementById('dayTitle').textContent=`${+selected.slice(5,7)}월 ${+selected.slice(8)}일 일정`; let first=new Date(cursor.getFullYear(),cursor.getMonth(),1), last=new Date(cursor.getFullYear(),cursor.getMonth()+1,0), html=''; for(let i=0;i<first.getDay();i++)html+='<div></div>'; for(let d=1;d<=last.getDate();d++){let dt=new Date(cursor.getFullYear(),cursor.getMonth(),d),k=key(dt), dots=events.filter(e=>e.date===k).slice(0,3).map(e=>`<i style="background:${e.color}"></i>`).join(''), label=dayNotes[k]?`<em class="day-note">${escapeHtml(dayNotes[k])}</em>`:''; html+=`<button class="day ${k===selected?'sel':''}" onclick="selectDay('${k}')"><span class="${k===key(now)?'now':''}">${d}</span>${label}<div class="dots">${dots}</div></button>`} document.getElementById('grid').innerHTML=html; renderList()}
    function renderList(){let es=events.filter(e=>e.date===selected).sort((a,b)=>a.time.localeCompare(b.time)), el=document.getElementById('list'); if(!es.length){el.innerHTML='<div class="empty"><div class="check">✓</div><h3>여유로운 하루예요</h3><p>새로운 일정을 추가해 보세요.</p></div>';return} el.innerHTML=es.map(e=>`<button class="event" onclick="edit('${e.id}')"><span class="bar" style="background:${e.color}"></span><span class="time">${e.time||'하루 종일'}</span><span class="copy"><b>${escapeHtml(e.title)}</b><small>${escapeHtml(e.note||'')}</small></span><span>›</span></button>`).join('')}
    function escapeHtml(s){let d=document.createElement('div');d.textContent=s;return d.innerHTML} function selectDay(k){selected=k;render()} function move(n){cursor=new Date(cursor.getFullYear(),cursor.getMonth()+n,1);render()} function goToday(){cursor=new Date(now.getFullYear(),now.getMonth(),1);selected=key(now);render()}
    function drawColors(){document.getElementById('colors').innerHTML=palette.map(c=>`<button type="button" class="color ${c===color?'active':''}" style="background:${c}" onclick="setColor('${c}')"></button>`).join('')} function setColor(c){color=c;drawColors()}
    function openModal(){editing=null;color=palette[0];document.getElementById('modalTitle').textContent='새 일정';document.getElementById('date').value=selected;document.getElementById('title').value='';document.getElementById('time').value='09:00';document.getElementById('note').value='';document.getElementById('del').style.display='none';drawColors();document.getElementById('shade').classList.add('show')}
    function edit(id){editing=events.find(e=>e.id===id);color=editing.color;document.getElementById('modalTitle').textContent='일정 수정';['date','title','time','note'].forEach(k=>document.getElementById(k).value=editing[k]||'');document.getElementById('del').style.display='block';drawColors();document.getElementById('shade').classList.add('show')}
    function closeModal(){document.getElementById('shade').classList.remove('show')} function persist(){localStorage.setItem('haru-events',JSON.stringify(events));render();pushSync()}
    function save(ev){ev.preventDefault();let item={id:editing?editing.id:String(Date.now()),date:document.getElementById('date').value,title:document.getElementById('title').value.trim(),time:document.getElementById('time').value,note:document.getElementById('note').value.trim(),color}; if(editing)events=events.map(e=>e.id===item.id?item:e);else events.push(item); selected=item.date;cursor=new Date(+item.date.slice(0,4),+item.date.slice(5,7)-1,1);persist();closeModal()}
    function updateSyncStatus(text){document.getElementById('syncStatus').textContent=text||(syncCode?`코드 ${syncCode} · 연결됨`:'동기화 설정')} function openSync(){document.getElementById('syncInput').value=syncCode;document.getElementById('syncShade').classList.add('show')} function closeSync(){document.getElementById('syncShade').classList.remove('show')} function generateSyncCode(){document.getElementById('syncInput').value=String(Math.floor(100000+Math.random()*900000))} async function saveSync(e){e.preventDefault();let code=document.getElementById('syncInput').value.trim();if(!/^\d{6}$/.test(code))return alert('숫자 6자리로 입력해 주세요.');syncCode=code;localStorage.setItem('haru-sync-code',code);closeSync();updateSyncStatus('연결 중…');await pullSync(true)} function disconnectSync(){syncCode='';remoteUpdatedAt=0;localStorage.removeItem('haru-sync-code');updateSyncStatus();closeSync()}
    async function pushSync(){if(!syncCode)return;updateSyncStatus('동기화 중…');try{let stamp=Date.now(),r=await fetch(SUPABASE+'/rest/v1/rpc/save_calendar',{method:'POST',headers:{'Content-Type':'application/json','apikey':API_KEY},body:JSON.stringify({sync_code:syncCode,calendar_data:{events,dayNotes},update_time:stamp})}),j=await r.json();if(!r.ok)throw new Error(j.message||'sync failed');remoteUpdatedAt=j.updatedAt||stamp;updateSyncStatus()}catch(e){updateSyncStatus('연결 확인 필요')}} async function pullSync(first){if(!syncCode)return;try{let r=await fetch(SUPABASE+'/rest/v1/rpc/get_calendar',{method:'POST',headers:{'Content-Type':'application/json','apikey':API_KEY},body:JSON.stringify({sync_code:syncCode})}),j=await r.json();if(!r.ok)throw new Error(j.message||'sync failed');if(j&&j.data&&(j.updatedAt>remoteUpdatedAt||first==='force')){events=j.data.events||[];dayNotes=j.data.dayNotes||{};remoteUpdatedAt=j.updatedAt;localStorage.setItem('haru-events',JSON.stringify(events));localStorage.setItem('haru-day-notes',JSON.stringify(dayNotes));render()}else if(first===true&&!j)await pushSync();updateSyncStatus()}catch(e){updateSyncStatus('연결 확인 필요')}} async function manualRefresh(){if(!syncCode)return openSync();let b=document.getElementById('refreshBtn');b.classList.add('spin');updateSyncStatus('새로고침 중…');await pullSync('force');setTimeout(()=>b.classList.remove('spin'),300)}
    function removeEvent(){if(editing&&confirm('이 일정을 삭제할까요?')){events=events.filter(e=>e.id!==editing.id);persist();closeModal()}} render();updateSyncStatus();if(syncCode){pullSync(true);setInterval(()=>pullSync(false),10000)}
    function openDayNote(){document.getElementById('dayNoteInput').value=dayNotes[selected]||'';document.getElementById('dayNoteShade').classList.add('show');setTimeout(()=>document.getElementById('dayNoteInput').focus(),100)} function closeDayNote(){document.getElementById('dayNoteShade').classList.remove('show')} function saveDayNote(e){e.preventDefault();let value=document.getElementById('dayNoteInput').value.trim();if(value)dayNotes[selected]=value;else delete dayNotes[selected];localStorage.setItem('haru-day-notes',JSON.stringify(dayNotes));render();closeDayNote();pushSync()} function deleteDayNote(){delete dayNotes[selected];localStorage.setItem('haru-day-notes',JSON.stringify(dayNotes));render();closeDayNote();pushSync()}
  </script>
</body></html>
