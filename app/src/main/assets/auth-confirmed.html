<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>HARU 이메일 인증 완료</title>
  <style>
    *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;background:#f3f1ec;color:#172022;font-family:Arial,sans-serif}.card{width:100%;max-width:440px;padding:42px 32px;text-align:center;background:#fff;border:1px solid #e3e0d9;border-radius:28px;box-shadow:0 20px 60px #423d3020}.logo{display:grid;place-items:center;width:72px;height:72px;margin:0 auto 24px;border-radius:22px;background:#6c5ce7;color:#fff;font-size:34px;font-weight:900}.eyebrow{margin:0 0 8px;color:#6c5ce7;font-size:11px;font-weight:900;letter-spacing:2px}h1{margin:0 0 14px;font-size:28px}p{margin:0;color:#737a7b;font-size:15px;line-height:1.7}.hint{margin-top:25px;padding:15px;border-radius:14px;background:#f3f0ff;color:#5547c7;font-size:13px;font-weight:700}
  </style>
</head>
<body>
  <main class="card">
    <div class="logo">H</div>
    <p class="eyebrow">HARU ACCOUNT</p>
    <h1>이메일 인증이 완료되었습니다</h1>
    <p>HARU 앱으로 돌아가<br>가입한 이메일과 비밀번호로 로그인해 주세요.</p>
    <div class="hint">이 페이지는 이제 닫아도 됩니다.</div>
  </main>
</body>
</html>
