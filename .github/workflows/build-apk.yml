name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HARU_KEYSTORE_BASE64: ${{ secrets.HARU_KEYSTORE_BASE64 }}
      HARU_KEYSTORE_PASSWORD: ${{ secrets.HARU_KEYSTORE_PASSWORD }}
      HARU_KEY_ALIAS: ${{ secrets.HARU_KEY_ALIAS }}
      HARU_KEY_PASSWORD: ${{ secrets.HARU_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"
      - run: gradle assembleDebug
      - name: Prepare release signing
        if: env.HARU_KEYSTORE_BASE64 != ''
        run: |
          echo "$HARU_KEYSTORE_BASE64" | base64 --decode > "$GITHUB_WORKSPACE/haru-upload.jks"
          echo "HARU_KEYSTORE_FILE=$GITHUB_WORKSPACE/haru-upload.jks" >> "$GITHUB_ENV"
      - name: Build release App Bundle
        run: gradle bundleRelease
      - run: cp app/build/outputs/apk/debug/app-debug.apk HARU.apk
      - uses: actions/upload-artifact@v4
        with:
          name: haru-calendar-apk
          path: app/build/outputs/apk/debug/app-debug.apk
      - uses: actions/upload-artifact@v4
        if: env.HARU_KEYSTORE_BASE64 == ''
        with:
          name: HARU-aab-unsigned-not-for-store
          path: app/build/outputs/bundle/release/app-release.aab
      - uses: actions/upload-artifact@v4
        if: env.HARU_KEYSTORE_BASE64 != ''
        with:
          name: HARU-play-store-aab
          path: app/build/outputs/bundle/release/app-release.aab
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: HARU-latest
          name: HARU Latest
          body: Android와 Windows용 HARU 최신 설치 파일입니다.
          files: HARU.apk
          overwrite_files: true
      - uses: softprops/action-gh-release@v2
        if: env.HARU_KEYSTORE_BASE64 != ''
        with:
          tag_name: HARU-latest
          name: HARU Latest
          files: app/build/outputs/bundle/release/app-release.aab
          overwrite_files: true
