name: Build Windows Calendar

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: Copy-Item ..\app\src\main\assets\index.html .\index.html
      - run: npm install
      - run: npm run dist
      - uses: actions/upload-artifact@v4
        with:
          name: HARU-windows
          path: desktop/release/HARU-Setup-*.exe
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: HARU-latest
          name: HARU Latest
          body: Android와 Windows용 HARU 최신 설치 파일입니다.
          files: desktop/release/HARU-Setup-*.exe
          overwrite_files: true
